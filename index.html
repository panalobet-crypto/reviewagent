<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="复盘AI">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="智能复盘助手 - AI引导深度反思，持续成长">
  
  <title>复盘AI</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  
  <!-- Splash Screens for iPhone -->
  <link rel="apple-touch-startup-image" href="splash.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --accent: #e94560;
      --accent-light: #ff6b6b;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.5);
      --card-bg: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }
    
    /* Welcome Screen */
    .screen {
      display: none;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
    }
    
    .screen.active {
      display: flex;
      flex-direction: column;
    }
    
    .welcome-screen {
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }
    
    .welcome-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(255, 183, 77, 0.1) 0%, transparent 40%);
      pointer-events: none;
    }
    
    .logo-container {
      position: relative;
      margin-bottom: 24px;
      z-index: 1;
    }
    
    .logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 20px 60px rgba(233, 69, 96, 0.4);
      transform: rotate(-3deg);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50% { transform: rotate(-3deg) translateY(-10px); }
    }
    
    .logo-glow {
      position: absolute;
      inset: -30px;
      background: radial-gradient(circle, rgba(233, 69, 96, 0.3) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    
    .title {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 8px;
      z-index: 1;
    }
    
    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 40px;
      z-index: 1;
    }
    
    .features {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
      z-index: 1;
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    
    .feature-icon {
      font-size: 18px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border: none;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 16px 48px;
      border-radius: 50px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4);
      transition: all 0.3s ease;
      z-index: 1;
    }
    
    .btn-primary:active {
      transform: scale(0.96);
    }
    
    /* Setup Screen */
    .setup-screen {
      padding-top: calc(60px + var(--safe-top));
    }
    
    .back-btn {
      position: fixed;
      top: calc(16px + var(--safe-top));
      left: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 100;
    }
    
    .setup-title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
    }
    
    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .option-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 16px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .option-card:active {
      transform: scale(0.96);
      background: rgba(255,255,255,0.1);
    }
    
    .option-icon {
      font-size: 36px;
      display: block;
      margin-bottom: 12px;
    }
    
    .option-name {
      font-size: 16px;
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    
    .option-desc {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .topic-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .selected-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      background: var(--card-bg);
      padding: 12px 20px;
      border-radius: 25px;
      flex-wrap: wrap;
    }
    
    .topic-input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      color: var(--text-primary);
      font-size: 16px;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 120px;
    }
    
    .topic-input::placeholder {
      color: var(--text-muted);
    }
    
    /* Chat Screen */
    .chat-screen {
      padding: 0;
      height: 100vh;
      height: -webkit-fill-available;
    }
    
    .chat-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: calc(12px + var(--safe-top)) 16px 12px;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    
    .chat-header-content {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .chat-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }
    
    .chat-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .chat-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: calc(100px + var(--safe-top)) 16px calc(90px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }
    
    .message {
      display: flex;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      justify-content: flex-end;
    }
    
    .message.ai {
      align-items: flex-start;
      gap: 10px;
    }
    
    .ai-avatar {
      width: 32px;
      height: 32px;
      background: var(--card-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .bubble {
      max-width: 85%;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    
    .bubble.user {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 20px 20px 4px 20px;
    }
    
    .bubble.ai {
      background: var(--card-bg);
      color: var(--text-secondary);
      border-radius: 20px 20px 20px 4px;
    }
    
    .typing {
      opacity: 0.6;
      font-style: italic;
    }
    
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px calc(12px + var(--safe-bottom));
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    
    .chat-input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px 18px;
      color: var(--text-primary);
      font-size: 16px;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 120px;
    }
    
    .send-btn {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border: none;
      color: #fff;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    
    .send-btn:disabled {
      opacity: 0.5;
    }
    
    .send-btn:active:not(:disabled) {
      transform: scale(0.9);
    }
    
    /* Report Screen */
    .report-screen {
      padding-top: calc(20px + var(--safe-top));
    }
    
    .report-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .report-logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    
    .report-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .report-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .report-content {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    .report-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    
    .report-text h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
    .report-text h2 { font-size: 18px; font-weight: 600; color: var(--accent); margin-top: 24px; margin-bottom: 12px; }
    .report-text h3 { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-top: 20px; margin-bottom: 10px; }
    .report-text p { margin-bottom: 12px; }
    .report-text li { margin-left: 16px; margin-bottom: 8px; }
    .report-text strong { color: var(--accent-light); }
    
    .report-actions {
      text-align: center;
      padding-bottom: calc(20px + var(--safe-bottom));
    }
    
    .btn-secondary {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      margin: 0 8px;
    }
    
    /* History */
    .history-btn {
      position: fixed;
      bottom: calc(100px + var(--safe-bottom));
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .history-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      padding: calc(60px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
      overflow-y: auto;
    }
    
    .history-modal.active {
      display: block;
    }
    
    .history-close {
      position: fixed;
      top: calc(16px + var(--safe-top));
      right: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 20px;
      z-index: 201;
    }
    
    .history-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    
    .history-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .history-item-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    
    .history-item-meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }
  </style>
</head>
<body>
  <!-- Welcome Screen -->
  <div id="welcome" class="screen welcome-screen active">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <div class="logo">復</div>
    </div>
    <h1 class="title">复盘 AI</h1>
    <p class="subtitle">智能复盘助手 · 深度反思 · 持续成长</p>
    
    <div class="features">
      <div class="feature">
        <span class="feature-icon">🎯</span>
        <span>多种框架</span>
      </div>
      <div class="feature">
        <span class="feature-icon">💬</span>
        <span>AI 引导</span>
      </div>
      <div class="feature">
        <span class="feature-icon">📊</span>
        <span>智能报告</span>
      </div>
    </div>
    
    <button class="btn-primary" onclick="showScreen('type')">
      开始复盘
      <span>→</span>
    </button>
  </div>
  
  <!-- Type Selection -->
  <div id="type" class="screen setup-screen">
    <button class="back-btn" onclick="showScreen('welcome')">← 返回</button>
    <h2 class="setup-title">选择复盘类型</h2>
    <div class="option-grid">
      <button class="option-card" onclick="selectType('project')">
        <span class="option-icon">📋</span>
        <span class="option-name">项目复盘</span>
        <span class="option-desc">回顾项目全过程</span>
      </button>
      <button class="option-card" onclick="selectType('decision')">
        <span class="option-icon">⚖️</span>
        <span class="option-name">决策复盘</span>
        <span class="option-desc">分析决策得失</span>
      </button>
      <button class="option-card" onclick="selectType('period')">
        <span class="option-icon">📅</span>
        <span class="option-name">周期复盘</span>
        <span class="option-desc">日/周/月回顾</span>
      </button>
      <button class="option-card" onclick="selectType('event')">
        <span class="option-icon">🎪</span>
        <span class="option-name">事件复盘</span>
        <span class="option-desc">特定事件分析</span>
      </button>
    </div>
  </div>
  
  <!-- Framework Selection -->
  <div id="framework" class="screen setup-screen">
    <button class="back-btn" onclick="showScreen('type')">← 返回</button>
    <h2 class="setup-title">选择复盘框架</h2>
    <div class="option-grid">
      <button class="option-card" onclick="selectFramework('kpt')">
        <span class="option-icon">🔄</span>
        <span class="option-name">KPT法</span>
        <span class="option-desc">保持·问题·尝试</span>
      </button>
      <button class="option-card" onclick="selectFramework('aar')">
        <span class="option-icon">🎯</span>
        <span class="option-name">AAR复盘</span>
        <span class="option-desc">行动后回顾</span>
      </button>
      <button class="option-card" onclick="selectFramework('pdca')">
        <span class="option-icon">♻️</span>
        <span class="option-name">PDCA</span>
        <span class="option-desc">计划执行检查行动</span>
      </button>
      <button class="option-card" onclick="selectFramework('fourF')">
        <span class="option-icon">💡</span>
        <span class="option-name">4F复盘</span>
        <span class="option-desc">事实·感受·发现·未来</span>
      </button>
    </div>
  </div>
  
  <!-- Topic Input -->
  <div id="topic" class="screen setup-screen">
    <button class="back-btn" onclick="showScreen('framework')">← 返回</button>
    <h2 class="setup-title">描述复盘主题</h2>
    <div class="topic-section">
      <div class="selected-info" id="selectedInfo"></div>
      <textarea 
        id="topicInput" 
        class="topic-input" 
        placeholder="例如：Q3 产品上线项目、上周的团队冲突处理、今天的重要会议..."
      ></textarea>
      <button class="btn-primary" onclick="startChat()" style="align-self: center;">
        开始复盘对话 →
      </button>
    </div>
  </div>
  
  <!-- Chat Screen -->
  <div id="chat" class="screen chat-screen">
    <div class="chat-header">
      <div class="chat-header-content">
        <div class="chat-logo">復</div>
        <div>
          <div class="chat-title" id="chatTitle"></div>
          <div class="chat-subtitle" id="chatSubtitle"></div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    
    <div class="messages-area" id="messagesArea"></div>
    
    <div class="input-area">
      <textarea 
        id="chatInput" 
        class="chat-input" 
        placeholder="详细描述你的想法..." 
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>
  
  <!-- Report Screen -->
  <div id="report" class="screen report-screen">
    <div class="report-header">
      <div class="report-logo">復</div>
      <h1 class="report-title">复盘报告</h1>
      <p class="report-subtitle" id="reportSubtitle"></p>
    </div>
    <div class="report-content">
      <div class="report-text" id="reportText"></div>
    </div>
    <div class="report-actions">
      <button class="btn-secondary" onclick="shareReport()">📤 分享</button>
      <button class="btn-primary" onclick="resetAll()">新复盘</button>
    </div>
  </div>
  
  <!-- History Button -->
  <button class="history-btn" id="historyBtn" onclick="showHistory()">📚</button>
  
  <!-- History Modal -->
  <div class="history-modal" id="historyModal">
    <button class="history-close" onclick="hideHistory()">✕</button>
    <h2 class="history-title">复盘历史</h2>
    <div id="historyList"></div>
  </div>

  <script>
    // App State
    let state = {
      reviewType: null,
      framework: null,
      topic: '',
      messages: [],
      currentQuestion: 0,
      answers: {},
      report: '',
      loading: false
    };
    
    // Data
    const types = {
      project: { name: '项目复盘', icon: '📋' },
      decision: { name: '决策复盘', icon: '⚖️' },
      period: { name: '周期复盘', icon: '📅' },
      event: { name: '事件复盘', icon: '🎪' }
    };
    
    const frameworks = {
      kpt: {
        name: 'KPT法',
        desc: '保持·问题·尝试',
        icon: '🔄',
        questions: [
          '有哪些做得好的地方应该继续保持？',
          '遇到了哪些问题或挑战？',
          '下次可以尝试哪些改进措施？'
        ]
      },
      aar: {
        name: 'AAR复盘',
        desc: '行动后回顾',
        icon: '🎯',
        questions: [
          '最初的目标和预期是什么？',
          '实际发生了什么？结果如何？',
          '为什么会出现这样的差距？',
          '从中学到了什么经验教训？'
        ]
      },
      pdca: {
        name: 'PDCA',
        desc: '计划执行检查行动',
        icon: '♻️',
        questions: [
          '当时的计划是什么？目标明确吗？',
          '执行过程中做了哪些事情？',
          '检查结果与计划的差距在哪里？',
          '下一步的行动改进计划是什么？'
        ]
      },
      fourF: {
        name: '4F复盘',
        desc: '事实·感受·发现·未来',
        icon: '💡',
        questions: [
          '发生了什么事实和数据？',
          '过程中有什么感受和情绪？',
          '从中发现了什么规律或洞察？',
          '未来会如何应用这些发现？'
        ]
      }
    };
    
    // Screen Management
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
      
      // Show/hide history button
      const historyBtn = document.getElementById('historyBtn');
      historyBtn.style.display = screenId === 'welcome' ? 'flex' : 'none';
    }
    
    // Type Selection
    function selectType(type) {
      state.reviewType = type;
      showScreen('framework');
    }
    
    // Framework Selection
    function selectFramework(fw) {
      state.framework = fw;
      updateSelectedInfo();
      showScreen('topic');
    }
    
    function updateSelectedInfo() {
      const type = types[state.reviewType];
      const fw = frameworks[state.framework];
      document.getElementById('selectedInfo').innerHTML = 
        `${type.icon} ${type.name} <span style="opacity:0.5">·</span> ${fw.icon} ${fw.name}`;
    }
    
    // Start Chat
    function startChat() {
      const topic = document.getElementById('topicInput').value.trim();
      if (!topic) {
        alert('请输入复盘主题');
        return;
      }
      
      state.topic = topic;
      state.messages = [];
      state.currentQuestion = 0;
      state.answers = {};
      
      const fw = frameworks[state.framework];
      
      // Add initial AI message
      addMessage('ai', `好的，让我们开始对「${topic}」进行${fw.name}复盘。\n\n我会引导你思考 ${fw.questions.length} 个关键问题。请尽量详细地回答。\n\n**第一个问题：**\n${fw.questions[0]}`);
      
      // Update UI
      document.getElementById('chatTitle').textContent = topic;
      document.getElementById('chatSubtitle').textContent = `${fw.name} · 问题 1/${fw.questions.length}`;
      updateProgress();
      
      showScreen('chat');
    }
    
    function addMessage(role, content) {
      state.messages.push({ role, content });
      renderMessages();
    }
    
    function renderMessages() {
      const area = document.getElementById('messagesArea');
      area.innerHTML = state.messages.map(msg => `
        <div class="message ${msg.role}">
          ${msg.role === 'ai' ? '<div class="ai-avatar">🤖</div>' : ''}
          <div class="bubble ${msg.role}">${formatText(msg.content)}</div>
        </div>
      `).join('');
      
      // Scroll to bottom
      setTimeout(() => {
        area.scrollTop = area.scrollHeight;
      }, 100);
    }
    
    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }
    
    function updateProgress() {
      const fw = frameworks[state.framework];
      const progress = ((state.currentQuestion + 1) / fw.questions.length) * 100;
      document.getElementById('progressFill').style.width = `${progress}%`;
    }
    
    // Send Message
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || state.loading) return;
      
      input.value = '';
      input.style.height = 'auto';
      
      // Save answer
      state.answers[state.currentQuestion] = text;
      addMessage('user', text);
      
      state.loading = true;
      document.getElementById('sendBtn').disabled = true;
      
      const fw = frameworks[state.framework];
      const nextQ = state.currentQuestion + 1;
      
      if (nextQ < fw.questions.length) {
        // Show typing indicator
        const area = document.getElementById('messagesArea');
        area.innerHTML += `
          <div class="message ai" id="typingIndicator">
            <div class="ai-avatar">🤖</div>
            <div class="bubble ai"><span class="typing">思考中...</span></div>
          </div>
        `;
        area.scrollTop = area.scrollHeight;
        
        // Get AI response
        const response = await callAI(text, nextQ);
        
        // Remove typing indicator
        document.getElementById('typingIndicator')?.remove();
        
        addMessage('ai', response);
        state.currentQuestion = nextQ;
        
        // Update UI
        document.getElementById('chatSubtitle').textContent = 
          `${fw.name} · 问题 ${nextQ + 1}/${fw.questions.length}`;
        updateProgress();
      } else {
        // Generate report
        addMessage('ai', '非常感谢你的详细分享！让我为你生成复盘报告...');
        
        const report = await generateReport();
        state.report = report;
        
        // Save to history
        saveToHistory();
        
        // Show report
        document.getElementById('reportSubtitle').textContent = 
          `${state.topic} · ${fw.name}`;
        document.getElementById('reportText').innerHTML = formatReport(report);
        showScreen('report');
      }
      
      state.loading = false;
      document.getElementById('sendBtn').disabled = false;
    }
    
    async function callAI(userInput, nextQ) {
      const fw = frameworks[state.framework];
      
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `你是一个专业的复盘教练，正在帮助用户进行${fw.name}复盘。
主题是：${state.topic}
当前框架：${fw.desc}
用户刚回答了问题：${fw.questions[state.currentQuestion]}

请：
1. 简短肯定用户的回答（1-2句）
2. 如果发现有价值的洞察点，可以追问一下（可选）
3. 然后自然地引出下一个问题：${fw.questions[nextQ]}

保持温和、专业、有洞察力的风格。使用中文回复。回复要简洁，不超过150字。`,
            messages: [{ role: 'user', content: userInput }]
          })
        });
        
        const data = await response.json();
        return data.content?.[0]?.text || '让我们继续下一个问题...\n\n' + fw.questions[nextQ];
      } catch (e) {
        return '让我们继续下一个问题...\n\n**' + fw.questions[nextQ] + '**';
      }
    }
    
    async function generateReport() {
      const fw = frameworks[state.framework];
      const allAnswers = Object.entries(state.answers)
        .map(([idx, ans]) => `问题：${fw.questions[idx]}\n回答：${ans}`)
        .join('\n\n');
      
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: '你是一个专业的复盘顾问，擅长从对话中提炼洞察并生成高质量的复盘报告。使用中文。',
            messages: [{
              role: 'user',
              content: `基于以下${fw.name}复盘对话，生成一份专业的复盘报告：

复盘主题：${state.topic}
复盘框架：${fw.name} - ${fw.desc}

对话记录：
${allAnswers}

请生成一份结构清晰的复盘报告，包含：
1. 📌 复盘概要（1-2句话总结）
2. ✅ 核心发现（3-5个要点）
3. 💡 关键洞察（深度分析）
4. 🎯 行动建议（具体可执行的下一步）
5. 📝 金句（一句话总结本次复盘的核心学习）

使用 Markdown 格式。`
            }]
          })
        });
        
        const data = await response.json();
        return data.content?.[0]?.text || '报告生成失败，请重试。';
      } catch (e) {
        return '报告生成失败：' + e.message;
      }
    }
    
    function formatReport(text) {
      return text
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^\- (.*$)/gm, '<li>$1</li>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }
    
    // History
    function saveToHistory() {
      const history = JSON.parse(localStorage.getItem('reviewHistory') || '[]');
      history.unshift({
        id: Date.now(),
        topic: state.topic,
        type: state.reviewType,
        framework: state.framework,
        report: state.report,
        date: new Date().toISOString()
      });
      // Keep only last 20
      localStorage.setItem('reviewHistory', JSON.stringify(history.slice(0, 20)));
    }
    
    function showHistory() {
      const history = JSON.parse(localStorage.getItem('reviewHistory') || '[]');
      const list = document.getElementById('historyList');
      
      if (history.length === 0) {
        list.innerHTML = '<div class="history-empty">暂无复盘记录</div>';
      } else {
        list.innerHTML = history.map(item => {
          const date = new Date(item.date);
          const fw = frameworks[item.framework];
          const type = types[item.type];
          return `
            <div class="history-item" onclick="loadHistory(${item.id})">
              <div class="history-item-title">${item.topic}</div>
              <div class="history-item-meta">
                ${type?.icon || ''} ${type?.name || ''} · ${fw?.icon || ''} ${fw?.name || ''} · 
                ${date.toLocaleDateString('zh-CN')}
              </div>
            </div>
          `;
        }).join('');
      }
      
      document.getElementById('historyModal').classList.add('active');
    }
    
    function hideHistory() {
      document.getElementById('historyModal').classList.remove('active');
    }
    
    function loadHistory(id) {
      const history = JSON.parse(localStorage.getItem('reviewHistory') || '[]');
      const item = history.find(h => h.id === id);
      if (item) {
        state.topic = item.topic;
        state.framework = item.framework;
        state.report = item.report;
        
        const fw = frameworks[item.framework];
        document.getElementById('reportSubtitle').textContent = 
          `${item.topic} · ${fw?.name || ''}`;
        document.getElementById('reportText').innerHTML = formatReport(item.report);
        
        hideHistory();
        showScreen('report');
      }
    }
    
    // Share
    function shareReport() {
      if (navigator.share) {
        navigator.share({
          title: `复盘报告：${state.topic}`,
          text: state.report
        });
      } else {
        // Copy to clipboard
        navigator.clipboard.writeText(state.report).then(() => {
          alert('报告已复制到剪贴板');
        });
      }
    }
    
    // Reset
    function resetAll() {
      state = {
        reviewType: null,
        framework: null,
        topic: '',
        messages: [],
        currentQuestion: 0,
        answers: {},
        report: '',
        loading: false
      };
      document.getElementById('topicInput').value = '';
      document.getElementById('chatInput').value = '';
      showScreen('welcome');
    }
    
    // Auto-resize textarea
    document.getElementById('chatInput')?.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    // Enter to send
    document.getElementById('chatInput')?.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
