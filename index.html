<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="复盘AI">
  <meta name="theme-color" content="#0f172a">
  <title>复盘AI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    :root {
      --bg: #0f172a;
      --bg-card: rgba(30, 41, 59, 0.8);
      --bg-input: rgba(51, 65, 85, 0.5);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(148, 163, 184, 0.1);
      --success: #10b981;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    
    .screen {
      display: none;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      padding: calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));
    }
    
    .screen.active { display: flex; flex-direction: column; }
    
    /* ========== Welcome ========== */
    .welcome {
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
    }
    
    .logo {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 20px;
      box-shadow: 0 20px 40px var(--accent-glow);
    }
    
    .welcome h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    
    .welcome p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 48px;
    }
    
    .btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 16px 48px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:active { transform: scale(0.96); opacity: 0.9; }
    
    .btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    
    .history-link {
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 14px;
      text-decoration: underline;
      cursor: pointer;
    }
    
    /* ========== Type Selection ========== */
    .setup { padding-top: calc(60px + var(--safe-top)); }
    
    .back-btn {
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 100;
    }
    
    .setup h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }
    
    .type-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .type-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
      cursor: pointer;
    }
    
    .type-card:active {
      transform: scale(0.98);
      border-color: var(--accent);
    }
    
    .type-icon {
      font-size: 28px;
      width: 48px;
      height: 48px;
      background: var(--bg-input);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .type-info { flex: 1; }
    .type-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .type-desc { font-size: 13px; color: var(--text-muted); }
    
    .type-card .arrow {
      color: var(--text-muted);
      font-size: 18px;
    }
    
    /* ========== Market Tags ========== */
    .market-section {
      margin-top: 32px;
    }
    
    .market-section h3 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }
    
    .market-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .market-tag {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .market-tag.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    
    /* ========== Topic Input ========== */
    .topic-screen {
      padding-top: calc(60px + var(--safe-top));
    }
    
    .selected-type {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-card);
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    
    .selected-type .icon { font-size: 24px; }
    .selected-type .name { font-size: 15px; font-weight: 500; }
    .selected-type .market {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .topic-input {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      color: var(--text);
      font-size: 16px;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 120px;
      margin-bottom: 24px;
    }
    
    .topic-input::placeholder { color: var(--text-muted); }
    .topic-input:focus { border-color: var(--accent); }
    
    /* ========== Chat ========== */
    .chat-screen { padding: 0; }
    
    .chat-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: calc(12px + var(--safe-top)) 16px 12px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    
    .chat-header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    
    .chat-header .logo {
      width: 36px;
      height: 36px;
      font-size: 18px;
      border-radius: 10px;
      margin: 0;
      box-shadow: none;
    }
    
    .chat-header-info { flex: 1; min-width: 0; }
    .chat-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-meta {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #6366f1);
      transition: width 0.4s ease;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: calc(95px + var(--safe-top)) 16px calc(85px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }
    
    .msg {
      display: flex;
      animation: fadeUp 0.3s ease;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .msg.user { justify-content: flex-end; }
    .msg.ai { gap: 10px; }
    
    .ai-avatar {
      width: 30px;
      height: 30px;
      background: var(--bg-card);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .bubble {
      max-width: 85%;
      padding: 14px 18px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    
    .bubble.user {
      background: var(--accent);
      border-radius: 20px 20px 4px 20px;
    }
    
    .bubble.ai {
      background: var(--bg-card);
      color: var(--text-secondary);
      border-radius: 20px 20px 20px 4px;
    }
    
    .typing { opacity: 0.6; font-style: italic; }
    
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px calc(12px + var(--safe-bottom));
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    
    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px 18px;
      color: var(--text);
      font-size: 16px;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 100px;
    }
    
    .send-btn {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .send-btn:disabled { opacity: 0.4; }
    
    /* ========== Report ========== */
    .report-screen {
      background: radial-gradient(ellipse at 50% 0%, rgba(59, 130, 246, 0.1) 0%, transparent 40%);
    }
    
    .report-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .report-header .logo {
      width: 56px;
      height: 56px;
      font-size: 26px;
      margin: 0 auto 16px;
    }
    
    .report-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    
    .report-header p {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .report-content {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
      flex: 1;
      overflow-y: auto;
    }
    
    .report-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    
    .report-text h1 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
    .report-text h2 { font-size: 17px; font-weight: 600; color: var(--accent); margin-top: 24px; margin-bottom: 12px; }
    .report-text h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-top: 16px; margin-bottom: 8px; }
    .report-text p { margin-bottom: 10px; }
    .report-text li { margin-left: 16px; margin-bottom: 6px; }
    .report-text strong { color: var(--accent); }
    
    .report-actions {
      display: flex;
      gap: 12px;
    }
    
    .report-actions .btn { flex: 1; padding: 14px; }
    
    /* ========== History ========== */
    .history-screen {
      padding-top: calc(60px + var(--safe-top));
    }
    
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
    }
    
    .history-item:active {
      background: var(--bg-input);
    }
    
    .history-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    
    .history-item-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
    }
    
    .history-item-date {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .history-item-meta {
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
    }
    
    .history-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  </style>
</head>
<body>
  <!-- Welcome -->
  <div id="welcome" class="screen welcome active">
    <div class="logo">復</div>
    <h1>复盘 AI</h1>
    <p>深度反思 · 持续成长</p>
    <button class="btn" onclick="showScreen('types')">开始复盘</button>
    <div class="history-link" onclick="showScreen('history')">查看历史记录</div>
  </div>
  
  <!-- Type Selection -->
  <div id="types" class="screen setup">
    <button class="back-btn" onclick="showScreen('welcome')">← 返回</button>
    <h2>选择复盘类型</h2>
    
    <div class="type-list" id="typeList"></div>
    
    <div class="market-section">
      <h3>市场标签（可选）</h3>
      <div class="market-tags" id="marketTags"></div>
    </div>
  </div>
  
  <!-- Topic Input -->
  <div id="topic" class="screen topic-screen">
    <button class="back-btn" onclick="showScreen('types')">← 返回</button>
    <h2>描述复盘主题</h2>
    
    <div class="selected-type" id="selectedType"></div>
    
    <textarea 
      id="topicInput" 
      class="topic-input" 
      placeholder="简单描述你要复盘的内容..."
    ></textarea>
    
    <button class="btn" style="width:100%" onclick="startChat()">开始复盘 →</button>
  </div>
  
  <!-- Chat -->
  <div id="chat" class="screen chat-screen">
    <div class="chat-header">
      <div class="chat-header-top">
        <div class="logo">復</div>
        <div class="chat-header-info">
          <div class="chat-title" id="chatTitle"></div>
          <div class="chat-meta" id="chatMeta"></div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    
    <div class="messages" id="messages"></div>
    
    <div class="input-area">
      <textarea 
        id="chatInput" 
        class="chat-input" 
        placeholder="输入你的回答..." 
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
    </div>
  </div>
  
  <!-- Report -->
  <div id="report" class="screen report-screen">
    <div class="report-header">
      <div class="logo">復</div>
      <h1>复盘报告</h1>
      <p id="reportMeta"></p>
    </div>
    <div class="report-content">
      <div class="report-text" id="reportText"></div>
    </div>
    <div class="report-actions">
      <button class="btn btn-secondary" onclick="shareReport()">📤 分享</button>
      <button class="btn" onclick="reset()">新复盘</button>
    </div>
  </div>
  
  <!-- History -->
  <div id="history" class="screen history-screen">
    <button class="back-btn" onclick="showScreen('welcome')">← 返回</button>
    <h2>复盘历史</h2>
    <div id="historyList"></div>
  </div>

  <script>
    // ========== Data ==========
    const types = [
      {
        id: 'daily',
        icon: '⚡',
        name: '快速日复盘',
        desc: '每日2分钟，保持节奏',
        questions: [
          '今天最重要的3件事是什么？完成了吗？',
          '遇到什么卡点或障碍？',
          '明天最重要的事是什么？'
        ]
      },
      {
        id: 'progress',
        icon: '📋',
        name: '项目进度复盘',
        desc: '追踪项目进展',
        questions: [
          '这个项目目前在什么阶段？本周期目标是什么？',
          '实际进度如何？完成度大概多少？',
          '什么在拖慢进度？主要卡点是什么？',
          '需要什么资源或支持才能推进？',
          '接下来最重要的3个行动是什么？',
          '有什么可能影响交付的风险？'
        ]
      },
      {
        id: 'project',
        icon: '🎯',
        name: '完整项目复盘',
        desc: '项目结束后总结',
        questions: [
          '这个项目最初的目标是什么？',
          '最终结果如何？达成了多少？',
          '过程中做得好的地方有哪些？',
          '有哪些地方可以做得更好？',
          '最大的教训是什么？',
          '如果重来一次，会怎么做？'
        ]
      },
      {
        id: 'decision',
        icon: '🧠',
        name: '决策复盘',
        desc: '重要决定的得失',
        questions: [
          '当时面临什么决策？有哪些选项？',
          '最终选了什么？为什么？',
          '决策时掌握的信息充分吗？',
          '结果如何？符合预期吗？',
          '如果信息更充分，会改变决定吗？',
          '这个决策教会了你什么？'
        ]
      },
      {
        id: 'team',
        icon: '👥',
        name: '团队管理复盘',
        desc: '老板视角回顾',
        questions: [
          '这段时间团队的主要任务是什么？',
          '各成员的执行情况如何？',
          '沟通和协作上有什么问题？',
          '团队的卡点主要在哪里？',
          '作为管理者，我哪里可以做得更好？',
          '下一步要调整什么？'
        ]
      }
    ];
    
    const markets = [
      { id: 'ph', name: '🇵🇭 PH', label: 'Philippines' },
      { id: 'bd', name: '🇧🇩 BD', label: 'Bangladesh' },
      { id: 'vn', name: '🇻🇳 VN', label: 'Vietnam' },
      { id: 'global', name: '🌐 通用', label: 'Global' }
    ];
    
    // ========== State ==========
    let state = {
      type: null,
      market: null,
      topic: '',
      messages: [],
      currentQ: 0,
      answers: {},
      report: '',
      loading: false
    };
    
    // ========== Init ==========
    function init() {
      renderTypes();
      renderMarkets();
      setupInputs();
    }
    
    function renderTypes() {
      const html = types.map(t => `
        <div class="type-card" onclick="selectType('${t.id}')">
          <div class="type-icon">${t.icon}</div>
          <div class="type-info">
            <div class="type-name">${t.name}</div>
            <div class="type-desc">${t.desc}</div>
          </div>
          <span class="arrow">›</span>
        </div>
      `).join('');
      document.getElementById('typeList').innerHTML = html;
    }
    
    function renderMarkets() {
      const html = markets.map(m => `
        <div class="market-tag" data-id="${m.id}" onclick="selectMarket('${m.id}')">${m.name}</div>
      `).join('');
      document.getElementById('marketTags').innerHTML = html;
    }
    
    function setupInputs() {
      const chatInput = document.getElementById('chatInput');
      chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
      });
      chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
    }
    
    // ========== Navigation ==========
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      
      if (id === 'history') renderHistory();
    }
    
    function selectType(id) {
      state.type = types.find(t => t.id === id);
      updateSelectedType();
      showScreen('topic');
    }
    
    function selectMarket(id) {
      state.market = state.market === id ? null : id;
      document.querySelectorAll('.market-tag').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === state.market);
      });
    }
    
    function updateSelectedType() {
      const market = state.market ? markets.find(m => m.id === state.market) : null;
      document.getElementById('selectedType').innerHTML = `
        <span class="icon">${state.type.icon}</span>
        <span class="name">${state.type.name}</span>
        ${market ? `<span class="market">${market.name}</span>` : ''}
      `;
    }
    
    // ========== Chat ==========
    function startChat() {
      const topic = document.getElementById('topicInput').value.trim();
      if (!topic) return alert('请输入复盘主题');
      
      state.topic = topic;
      state.messages = [];
      state.currentQ = 0;
      state.answers = {};
      
      const t = state.type;
      const firstQ = t.questions[0];
      
      addMsg('ai', `好，我们开始「${topic}」的${t.name}。\n\n共 ${t.questions.length} 个问题，请尽量详细回答。\n\n**问题 1：**\n${firstQ}`);
      
      document.getElementById('chatTitle').textContent = topic;
      updateChatMeta();
      updateProgress();
      showScreen('chat');
    }
    
    function addMsg(role, content) {
      state.messages.push({ role, content });
      renderMessages();
    }
    
    function renderMessages() {
      const html = state.messages.map(m => `
        <div class="msg ${m.role}">
          ${m.role === 'ai' ? '<div class="ai-avatar">🤖</div>' : ''}
          <div class="bubble ${m.role}">${formatText(m.content)}</div>
        </div>
      `).join('');
      
      const area = document.getElementById('messages');
      area.innerHTML = html;
      setTimeout(() => area.scrollTop = area.scrollHeight, 50);
    }
    
    function formatText(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }
    
    function updateChatMeta() {
      const t = state.type;
      const market = state.market ? markets.find(m => m.id === state.market)?.name : '';
      document.getElementById('chatMeta').textContent = 
        `${t.name} · 问题 ${state.currentQ + 1}/${t.questions.length}${market ? ' · ' + market : ''}`;
    }
    
    function updateProgress() {
      const pct = ((state.currentQ + 1) / state.type.questions.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
    }
    
    async function send() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || state.loading) return;
      
      input.value = '';
      input.style.height = 'auto';
      
      state.answers[state.currentQ] = text;
      addMsg('user', text);
      
      state.loading = true;
      document.getElementById('sendBtn').disabled = true;
      
      const t = state.type;
      const nextQ = state.currentQ + 1;
      
      if (nextQ < t.questions.length) {
        showTyping();
        const response = await callAI(text, nextQ);
        hideTyping();
        addMsg('ai', response);
        state.currentQ = nextQ;
        updateChatMeta();
        updateProgress();
      } else {
        addMsg('ai', '好的，让我整理一下复盘报告...');
        const report = await generateReport();
        state.report = report;
        saveHistory();
        showReport();
      }
      
      state.loading = false;
      document.getElementById('sendBtn').disabled = false;
    }
    
    function showTyping() {
      const area = document.getElementById('messages');
      area.innerHTML += `
        <div class="msg ai" id="typing">
          <div class="ai-avatar">🤖</div>
          <div class="bubble ai"><span class="typing">思考中...</span></div>
        </div>
      `;
      area.scrollTop = area.scrollHeight;
    }
    
    function hideTyping() {
      document.getElementById('typing')?.remove();
    }
    
    async function callAI(userInput, nextQ) {
      const t = state.type;
      const market = state.market ? markets.find(m => m.id === state.market)?.label : '';
      
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `你是一个专业的复盘教练。正在帮助用户进行「${t.name}」。
主题：${state.topic}${market ? '\n市场：' + market : ''}
用户刚回答了：${t.questions[state.currentQ]}

请：
1. 简短肯定（1句话）
2. 自然引出下一个问题：${t.questions[nextQ]}

风格：温和、专业、简洁。中文回复，不超过100字。`,
            messages: [{ role: 'user', content: userInput }]
          })
        });
        const data = await res.json();
        return data.content?.[0]?.text || `好的。\n\n**问题 ${nextQ + 1}：**\n${t.questions[nextQ]}`;
      } catch (e) {
        return `好的。\n\n**问题 ${nextQ + 1}：**\n${t.questions[nextQ]}`;
      }
    }
    
    async function generateReport() {
      const t = state.type;
      const market = state.market ? markets.find(m => m.id === state.market)?.label : '';
      const qa = Object.entries(state.answers)
        .map(([i, a]) => `问题：${t.questions[i]}\n回答：${a}`)
        .join('\n\n');
      
      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: '你是复盘顾问，擅长提炼洞察。中文回复。',
            messages: [{
              role: 'user',
              content: `基于以下复盘对话生成报告：

类型：${t.name}
主题：${state.topic}${market ? '\n市场：' + market : ''}

对话：
${qa}

报告结构：
1. 📌 一句话总结
2. ✅ 核心发现（3-5点）
3. 💡 关键洞察
4. 🎯 行动建议（具体可执行）
5. 📝 金句

用 Markdown 格式，简洁有力。`
            }]
          })
        });
        const data = await res.json();
        return data.content?.[0]?.text || '报告生成失败';
      } catch (e) {
        return '报告生成失败：' + e.message;
      }
    }
    
    function showReport() {
      const t = state.type;
      const market = state.market ? markets.find(m => m.id === state.market)?.name : '';
      document.getElementById('reportMeta').textContent = 
        `${state.topic} · ${t.name}${market ? ' · ' + market : ''}`;
      document.getElementById('reportText').innerHTML = formatReport(state.report);
      showScreen('report');
    }
    
    function formatReport(text) {
      return text
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^\- (.*$)/gm, '<li>$1</li>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }
    
    // ========== History ==========
    function saveHistory() {
      const list = JSON.parse(localStorage.getItem('reviews') || '[]');
      list.unshift({
        id: Date.now(),
        type: state.type.id,
        market: state.market,
        topic: state.topic,
        report: state.report,
        date: new Date().toISOString()
      });
      localStorage.setItem('reviews', JSON.stringify(list.slice(0, 50)));
    }
    
    function renderHistory() {
      const list = JSON.parse(localStorage.getItem('reviews') || '[]');
      const container = document.getElementById('historyList');
      
      if (!list.length) {
        container.innerHTML = `
          <div class="history-empty">
            <div class="history-empty-icon">📝</div>
            <p>还没有复盘记录</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = '<div class="history-list">' + list.map(item => {
        const t = types.find(x => x.id === item.type);
        const m = item.market ? markets.find(x => x.id === item.market) : null;
        const date = new Date(item.date).toLocaleDateString('zh-CN');
        return `
          <div class="history-item" onclick="loadHistory(${item.id})">
            <div class="history-item-top">
              <div class="history-item-title">${item.topic}</div>
              <div class="history-item-date">${date}</div>
            </div>
            <div class="history-item-meta">
              <span>${t?.icon || ''} ${t?.name || ''}</span>
              ${m ? `<span>${m.name}</span>` : ''}
            </div>
          </div>
        `;
      }).join('') + '</div>';
    }
    
    function loadHistory(id) {
      const list = JSON.parse(localStorage.getItem('reviews') || '[]');
      const item = list.find(x => x.id === id);
      if (!item) return;
      
      state.type = types.find(t => t.id === item.type);
      state.market = item.market;
      state.topic = item.topic;
      state.report = item.report;
      showReport();
    }
    
    // ========== Actions ==========
    function shareReport() {
      const text = `【复盘报告】${state.topic}\n\n${state.report}`;
      if (navigator.share) {
        navigator.share({ title: '复盘报告', text });
      } else {
        navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
      }
    }
    
    function reset() {
      state = { type: null, market: null, topic: '', messages: [], currentQ: 0, answers: {}, report: '', loading: false };
      document.getElementById('topicInput').value = '';
      document.getElementById('chatInput').value = '';
      document.querySelectorAll('.market-tag').forEach(el => el.classList.remove('selected'));
      showScreen('welcome');
    }
    
    // ========== Start ==========
    init();
  </script>
</body>
</html>
